<section class="partners-section section-pad-sm">
  <div class="container">

    <div class="partners-strip">
      <a
        *ngFor="let item of entries"
        [href]="item.url"
        target="_blank"
        rel="noopener noreferrer"
        class="partner-logo-link"
      >
        <img
          [src]="item.headerImg"
          [alt]="item.title"
          class="partner-logo"
          loading="lazy"
          [class]="'partner-logo partner-logo--' + item.title.toLowerCase()"
        />
      </a>
    </div>

  </div>
</section>
