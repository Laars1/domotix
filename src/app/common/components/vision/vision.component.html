<section class="vision-section">

  <!-- Full-viewport-width grid — image bleeds to right edge on desktop -->
  <div class="vision-grid">

    <div class="vision-text-col">
      <span class="section-label">{{ 'vision.title' | translate }}</span>
      <p class="vision-body">{{ 'vision.text' | translate }}</p>
    </div>

    <div class="vision-image-col">
      <img
        src="assets/images/vision.png"
        alt="Modernes Wohnzimmer mit Domotix Gebäudeautomation"
        class="vision-image"
        loading="lazy"
      />
    </div>

  </div>

</section>
