<section class="services-section section-pad" id="services">
  <div class="container">

    <span class="section-label">{{ 'services.label' | translate }}</span>
    <div class="hairline"></div>

    <div class="services-grid">
      <div
        class="service-tile"
        *ngFor="let service of services"
        (click)="open(service)"
        role="button"
        tabindex="0"
        (keydown.enter)="open(service)"
        (keydown.space)="open(service)"
      >
        <i [class]="'bi ' + service.icon + ' service-icon'" aria-hidden="true"></i>
        <h3 class="service-title">{{ (service.key + '.title') | translate }}</h3>
        <p class="service-tagline">{{ (service.key + '.tagline') | translate }}</p>
        <span class="service-cta">{{ 'services.more' | translate }} →</span>
      </div>
    </div>

  </div>
</section>

<!-- Modal -->
<div class="service-modal-backdrop" *ngIf="activeService" (click)="close()">
  <div class="service-modal" (click)="$event.stopPropagation()">
    <button class="service-modal__close" (click)="close()" aria-label="Close">
      <i class="bi bi-x"></i>
    </button>
    <i [class]="'bi ' + activeService.icon + ' service-modal__icon'" aria-hidden="true"></i>
    <h2 class="service-modal__title">{{ (activeService.key + '.title') | translate }}</h2>
    <p class="service-modal__text">{{ (activeService.key + '.text') | translate }}</p>
  </div>
</div>
