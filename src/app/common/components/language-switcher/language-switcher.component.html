<div class="lang-switcher" role="group" aria-label="Language switcher">
  <ng-container *ngFor="let language of supportedLanguages; let last = last">
    <button
      type="button"
      class="lang-btn"
      [class.lang-btn--active]="language === currentLanguage"
      (click)="switchLanguage(language)"
    >{{ language.toUpperCase() }}</button>
    <span *ngIf="!last" class="lang-sep" aria-hidden="true">/</span>
  </ng-container>
</div>
