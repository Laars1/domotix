<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Domotix</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="./assets/favicons/favicon.ico" />
  <script>
    // GitHub Pages SPA redirect: stellt den Pfad nach dem Redirect wieder her
    (function() {
      var redirect = sessionStorage.getItem('redirectPath');
      if (redirect) {
        sessionStorage.removeItem('redirectPath');
        window.history.replaceState(null, '', redirect);
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
