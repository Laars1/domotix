<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Domotix</title>
  <script>
    // GitHub Pages SPA redirect: speichert den Pfad und leitet zu index.html
    var path = window.location.pathname;
    sessionStorage.setItem('redirectPath', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
